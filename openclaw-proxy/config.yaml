name: "OpenClaw Bridge"
version: "1.0.3"
slug: "openclaw_bridge"
description: "Bridge your OpenClaw gateway into Home Assistant. Access the panel from the HA sidebar without any extra port setup."
arch:
  - aarch64
  - amd64

startup: application
boot: auto
init: false

ingress: true
ingress_port: 8099
ingress_panel: true
panel_title: "OpenClaw"
panel_icon: "mdi:robot"
image: wghaos/addons-openclaw-proxy-{arch}
options:
  target_port: 18789

schema:
  target_host: str?
  target_port: int
