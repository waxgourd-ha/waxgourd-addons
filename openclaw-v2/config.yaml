name: "OpenClaw小龙虾前沿版"
version: "2026.4.2-2"
slug: "openclaw_v2"
description: "AI 智能助手，深度集成 Home Assistant。支持本地/云端混合模型，提供中英文配置界面。"
url: "https://github.com/openclaw/openclaw"
arch:
  - amd64
  - aarch64
startup: services
boot: auto
init: false
hassio_api: true
hassio_role: manager
homeassistant_api: true
host_network: true
docker_api: true
image: wghaos/addons-openclaw-v2-{arch}
# Home Assistant Ingress (UI inside the add-on page)
ingress: true
ingress_port: 8099
panel_title: "小龙虾前沿版"
panel_icon: "mdi:robot"

# 环境变量（与发布配置尽量保持一致）
environment:
  HOME: "/config"
  XDG_CONFIG_HOME: "/config"
  OPENCLAW_CONFIG_DIR: "/config/.openclaw"
  OPENCLAW_WORKSPACE_DIR: "/config/.openclaw/workspace"
  NODE_COMPILE_CACHE: "/config/.cache/node-compile-cache"

map:
  - addon_config:rw
  - share:rw
  - homeassistant_config:rw
  - ssl:ro
  - media:rw
  - backup:ro
  - all_addon_configs:ro

options:
  # ==================== 网关配置 ====================
  # 仅通过 Ingress 访问管理 UI（8099），关闭局域网直连
  ingress_only: false

  # 禁止局域网直接通过 ip:18789 访问（仅允许 HA 内部 bridge 网络访问，proxy addon 不受影响）
  disable_direct_access: false

  # 时区设置
  timezone: "Asia/Shanghai"

  # 网关绑定模式：loopback=仅本地, lan=局域网访问
  gateway_bind_mode: "lan"

  # 网关端口（默认 18789）
  gateway_port: 18789

  # 允许 HTTP 认证（仅在无法使用 HTTPS 时启用，存在安全风险）
  allow_insecure_auth: true

  # 网关公开 URL（用于在新标签页中打开网关 UI）
  gateway_public_url: ""

  # ==================== 基础设置 ====================
  # 启用 Web 终端（在 Home Assistant 内嵌的终端）
  enable_terminal: true

  # ==================== SSH Shell 设置 ====================
  # 启用 SSH 登录（默认关闭，用于开发调试）
  enable_ssh: false

  # SSH 端口（默认 22）
  ssh_port: 22

  # SSH 登录用户名
  ssh_username: "root"

  # SSH 登录密码（留空则禁用密码认证）
  ssh_password: ""

  # ==================== 高级设置 ====================
  # 清理会话锁（启动时/退出时）
  clean_session_locks_on_start: true
  clean_session_locks_on_exit: true

schema:
  # 网关配置
  ingress_only: bool?
  disable_direct_access: bool?
  timezone: str
  gateway_bind_mode: list(loopback|lan)?
  gateway_port: int(1,65535)?
  allow_insecure_auth: bool?
  gateway_public_url: str?
  # 基础设置
  enable_terminal: bool?

  # SSH Shell
  enable_ssh: bool?
  ssh_port: int(1,65535)?
  ssh_username: str?
  ssh_password: str?

  # 高级设置
  clean_session_locks_on_start: bool?
  clean_session_locks_on_exit: bool?

  # 一键升级
  ha_host_ssh_password: str?
  ha_host_ssh_port: int(1,65535)?

