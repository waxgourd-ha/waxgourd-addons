# NOTE: English edition of the OpenClaw HA Addon.
# Plugin installation is intentionally removed in this edition.

name: "OpenClaw"
version: "2026.3.24"
slug: "openclaw"
description: "AI assistant deeply integrated with Home Assistant. Supports local and cloud AI models."
url: "https://github.com/openclaw/openclaw"
image: wghaos/addons-openclaw-en-{arch}
arch:
  - amd64
  - aarch64
startup: services
boot: auto
init: false
hassio_api: true
hassio_role: manager
homeassistant_api: true
host_network: true
docker_api: true

# Home Assistant Ingress (UI inside the add-on page)
ingress: true
ingress_port: 8099
panel_title: "OpenClaw"
panel_icon: "mdi:robot"

# Environment variables
environment:
  HOME: "/config"
  XDG_CONFIG_HOME: "/config"
  OPENCLAW_CONFIG_DIR: "/config/.openclaw"
  OPENCLAW_WORKSPACE_DIR: "/config/.openclaw/workspace"
  NODE_COMPILE_CACHE: "/config/.cache/node-compile-cache"

map:
  - addon_config:rw
  - share:rw
  - homeassistant_config:rw
  - ssl:ro
  - media:rw
  - backup:ro
  - all_addon_configs:ro

options:
  # Restrict UI access to HA panel only (disables direct IP:8099 access)
  ingress_only: false

  # Timezone
  timezone: "UTC"

  # Gateway bind mode: loopback = local only, lan = LAN access
  gateway_bind_mode: "lan"

  # Gateway port (default 18789)
  gateway_port: 18789

  # Allow HTTP auth (only enable if HTTPS is unavailable, security risk)
  allow_insecure_auth: true

  # Gateway public URL (for opening in a new tab)
  gateway_public_url: ""

  # Enable Web Terminal
  enable_terminal: true

  # Enable SSH (disabled by default, for development use)
  enable_ssh: false

  # SSH port
  ssh_port: 22

  # SSH username
  ssh_username: "root"

  # SSH password (leave empty to disable password auth)
  ssh_password: ""

  # Clean session locks on start/exit
  clean_session_locks_on_start: true
  clean_session_locks_on_exit: true

schema:
  # Gateway settings
  ingress_only: bool?
  timezone: str
  gateway_bind_mode: list(loopback|lan)?
  gateway_port: int(1,65535)?
  allow_insecure_auth: bool?
  gateway_public_url: str?
  # General settings
  enable_terminal: bool?

  # SSH Shell
  enable_ssh: bool?
  ssh_port: int(1,65535)?
  ssh_username: str?
  ssh_password: str?

  # Advanced settings
  clean_session_locks_on_start: bool?
  clean_session_locks_on_exit: bool?

  # One-click upgrade
  ha_host_ssh_password: str?
  ha_host_ssh_port: int(1,65535)?

