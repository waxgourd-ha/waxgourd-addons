configuration:
  provider:
    name: 默认提供商
    description: ZeroClaw 的 default_provider，建议填 qwen、openrouter、openai 等上游 provider id。
  model:
    name: 默认模型
    description: ZeroClaw 的 default_model，例如 qwen3.6-plus。
  gateway_host:
    name: 网关监听地址
    description: ZeroClaw gateway.host，默认 0.0.0.0。
  gateway_port:
    name: 网关端口
    description: ZeroClaw gateway.port，默认 42617。
  api_key:
    name: API 密钥
    description: 按 provider 自动映射到上游 API key 环境变量。内置 qwen、openrouter、openai、anthropic、groq；其他 provider 请在环境变量列表里填写其上游变量。
  env_vars:
    name: 环境变量列表
    description: 高级扩展变量列表，仅使用 ZeroClaw 上游已定义变量。这里用于补充额外变量，不建议重复填写上面的固定字段。